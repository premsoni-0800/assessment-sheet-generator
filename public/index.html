<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AssessSheet – Assessment Generator</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&family=Lora:wght@400;700&family=Merriweather:wght@400;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body style="margin:0;background:#0d0f14;">

    <!-- SPLASH SCREEN — inside body, before root -->
    <!-- SPLASH SCREEN -->
<div id="splash-screen" style="position:fixed;inset:0;z-index:9999;background:#080b12;display:flex;align-items:center;justify-content:center;overflow:hidden;">

  <div style="position:absolute;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(99,102,241,0.22) 0%,transparent 65%);top:-80px;left:-100px;animation:drift1 8s ease-in-out infinite alternate;"></div>
  <div style="position:absolute;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,rgba(139,92,246,0.18) 0%,transparent 65%);bottom:-60px;right:-80px;animation:drift2 10s ease-in-out infinite alternate;"></div>
  <div style="position:absolute;width:300px;height:300px;border-radius:50%;background:radial-gradient(circle,rgba(59,130,246,0.12) 0%,transparent 65%);top:40%;left:55%;animation:drift3 12s ease-in-out infinite alternate;"></div>

  <div id="splash-particles" style="position:absolute;inset:0;pointer-events:none;"></div>

  <div id="splash-card" style="position:relative;z-index:3;text-align:center;padding:52px 60px 44px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:24px;backdrop-filter:blur(40px);-webkit-backdrop-filter:blur(40px);filter:blur(24px) saturate(0.5);opacity:0;transform:scale(0.96) translateY(12px);transition:filter 1.4s cubic-bezier(0.16,1,0.3,1),opacity 1.4s cubic-bezier(0.16,1,0.3,1),transform 1.4s cubic-bezier(0.16,1,0.3,1);max-width:420px;width:90%;">
    <div style="width:72px;height:72px;border-radius:20px;background:linear-gradient(135deg,rgba(139,92,246,0.8),rgba(99,102,241,0.8));display:flex;align-items:center;justify-content:center;margin:0 auto 24px;border:1px solid rgba(255,255,255,0.15);box-shadow:0 8px 32px rgba(99,102,241,0.3);font-size:24px;font-weight:700;color:#fff;font-family:Georgia,serif;">A</div>
    <div style="font-size:36px;font-weight:700;color:#fff;letter-spacing:-1.5px;font-family:Georgia,serif;margin-bottom:8px;">Assess<span style="background:linear-gradient(135deg,#a78bfa,#818cf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">Sheet</span></div>
    <div style="font-size:11px;letter-spacing:3.5px;color:rgba(255,255,255,0.3);text-transform:uppercase;font-family:monospace;margin-bottom:32px;">Assessment Generator</div>
    <div style="width:1px;height:32px;background:linear-gradient(to bottom,transparent,rgba(255,255,255,0.2),transparent);margin:0 auto 32px;"></div>
    <button id="splash-enter" style="display:inline-flex;align-items:center;gap:10px;padding:13px 40px;background:rgba(139,92,246,0.15);border:1px solid rgba(139,92,246,0.4);border-radius:100px;color:rgba(167,139,250,1);font-size:13px;letter-spacing:2px;text-transform:uppercase;font-family:monospace;cursor:pointer;transition:all 0.35s ease;">
      Enter
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
    </button>
  </div>

  <a href="https://www.instagram.com/pratham.soni.54/" target="_blank" id="splash-insta" style="position:absolute;bottom:20px;right:22px;display:flex;align-items:center;gap:8px;text-decoration:none;opacity:0;transform:translateY(6px);transition:opacity 0.6s ease,transform 0.6s ease;z-index:10;">
    <div style="width:24px;height:24px;border-radius:7px;background:linear-gradient(135deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888);display:flex;align-items:center;justify-content:center;">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="5"/><circle cx="17.5" cy="6.5" r="1.5" fill="white" stroke="none"/></svg>
    </div>
    <span style="font-size:11.5px;color:rgba(255,255,255,0.38);font-family:monospace;">@pratham.soni.54</span>
  </a>

  <div id="splash-veil" style="position:absolute;inset:0;background:#080b12;opacity:0;pointer-events:none;transition:opacity 0.7s ease;z-index:20;"></div>
</div>

<style>
  @keyframes drift1 { to { transform:translate(40px,60px); } }
  @keyframes drift2 { to { transform:translate(-50px,-40px); } }
  @keyframes drift3 { to { transform:translate(-30px,30px); } }
  @keyframes floatUp { 0%{transform:translateY(0) scale(1);opacity:0;} 10%{opacity:1;} 90%{opacity:0.4;} 100%{transform:translateY(-100vh) scale(0);opacity:0;} }
  #splash-enter:hover { border-color:rgba(139,92,246,0.8);box-shadow:0 0 24px rgba(139,92,246,0.25);transform:translateY(-1px);color:#c4b5fd; }
</style>

<script>
  // Particles
  const _pc = document.getElementById('splash-particles');
  for(let i=0;i<18;i++){
    const _p = document.createElement('div');
    const _s = Math.random()*2+1;
    _p.style.cssText=`position:absolute;border-radius:50%;background:rgba(139,92,246,0.5);width:${_s}px;height:${_s}px;left:${Math.random()*100}%;bottom:${Math.random()*20}%;animation:floatUp ${6+Math.random()*8}s linear ${Math.random()*6}s infinite;opacity:0;`;
    _pc.appendChild(_p);
  }
  // Reveal
  setTimeout(()=>{
    const c=document.getElementById('splash-card');
    c.style.filter='blur(0) saturate(1)';
    c.style.opacity='1';
    c.style.transform='scale(1) translateY(0)';
  },200);
  // Instagram
  setTimeout(()=>{
    const ig=document.getElementById('splash-insta');
    ig.style.opacity='1';
    ig.style.transform='translateY(0)';
  },2000);
  // Enter
  document.getElementById('splash-enter').addEventListener('click',function(e){
    e.stopPropagation();
    document.getElementById('splash-veil').style.opacity='1';
    setTimeout(()=>{ document.getElementById('splash-screen').style.display='none'; },750);
  });
</script>
